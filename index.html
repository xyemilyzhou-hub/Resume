<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Emily Jow - Resume</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    header {
      padding: 24px;
      text-align: center;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      margin: 6px 0 0;
      font-size: 16px;
      color: #555;
    }

    .buttons {
      margin-top: 16px;
    }

    .button {
      display: inline-block;
      margin: 6px;
      padding: 10px 16px;
      background: #222;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }

    .button:hover {
      background: #444;
    }

    .resume-section {
      width: 100%;
      height: calc(100vh - 150px);
      background: #eaeaea;
    }

    .resume-viewer {
      width: 100%;
      height: 100%;
      border: none;
    }

    .fallback {
      padding: 24px;
      text-align: center;
      font-family: Arial, sans-serif;
    }

    .fallback a {
      color: #222;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      header {
        padding: 18px;
      }

      h1 {
        font-size: 24px;
      }

      .subtitle {
        font-size: 14px;
      }

      .button {
        display: block;
        width: fit-content;
        margin: 8px auto;
      }

      .resume-section {
        height: calc(100vh - 230px);
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Emily Jow</h1>
    <p class="subtitle">Senior Actuarial Associate & Actuary</p>
    <p class="subtitle">Reinsurance Valuation / Pricing Support / Experience Study</p>

    <div class="buttons">
      <a class="button" href="resume.pdf" target="_blank" rel="noopener noreferrer">Open Resume</a>
      <a class="button" href="resume.pdf" download>Download Resume</a>
      <a class="button" href="mailto:emily.jow09@gmail.com">Contact Me</a>
      <a class="button" href="https://www.linkedin.com/in/emilyjow09/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    </div>
  </header>

  <main class="resume-section">
    <object
      class="resume-viewer"
      data="resume.pdf"
      type="application/pdf">

      <div class="fallback">
        <p>Your browser cannot display the PDF directly.</p>
        <p>
          <a href="resume.pdf" target="_blank" rel="noopener noreferrer">Open the resume here</a>
          or
          <a href="resume.pdf" download>download it here</a>.
        </p>
      </div>

    </object>
  </main>
</body>
</html>
