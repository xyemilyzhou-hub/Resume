<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Emily Jow - Resume</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    header {
      padding: 24px;
      text-align: center;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 6px 0;
    }

    .buttons {
      margin-top: 16px;
    }

    .button {
      display: inline-block;
      margin: 6px;
      padding: 10px 16px;
      background: #222;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }

    .resume-viewer {
      width: 100%;
      height: 90vh;
      border: none;
    }

    .fallback {
      padding: 24px;
      text-align: center;
    }
  </style>
</head>

<body>
  <header>
    <h1>Emily Jow</h1>
    <p>Valuation / Pricing Support / Experience Study</p>

    <div class="buttons">
      <a class="button" href="resume.pdf" target="_blank">Open Resume</a>
      <a class="button" href="resume.pdf" download>Download Resume</a>
      <a class="button" href="mailto:emily.jow09@gmail.com">Contact Me</a>
      <a class="button" href="https://www.linkedin.com/in/emilyjow09/" target="_blank">LinkedIn</a>
    </div>
  </header>

  <object
    class="resume-viewer"
    data="resume.pdf"
    type="application/pdf">

    <div class="fallback">
      <p>Your browser cannot display the PDF directly.</p>
      <p>
        <a href="resume.pdf" target="_blank">Open the resume here</a>
        or
        <a href="resume.pdf" download>download it here</a>.
      </p>
    </div>

  </object>
</body>
</html>
